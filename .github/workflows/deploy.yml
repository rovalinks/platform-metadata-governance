name: Deploy Metadata Governance

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    env:
      PROJECT_ID: platform-metadata-demo
      REGION: europe-west2
      REPOSITORY: platform-images
      IMAGE_NAME: governance-engine

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Build Image
        run: |
          docker build \
            -t europe-west2-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }} \
            ./cloudrun

      - name: Push Image
        run: |
          docker push \
            europe-west2-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy metadata-governance \
            --project=platform-metadata-demo \
            --region=europe-west2 \
            --image=europe-west2-docker.pkg.dev/platform-metadata-demo/platform-images/governance-engine:${GITHUB_SHA} \
            --service-account=governance-engine-sa@platform-metadata-demo.iam.gserviceaccount.com \
            --allow-unauthenticated